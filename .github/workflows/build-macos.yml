name: Build macOS Application

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-12
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        architecture: 'x64'
        
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/Library/Caches/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build with PyInstaller
      run: |
        pyinstaller \
          --name "SignalReceiver" \
          --onefile \
          --windowed \
          --icon=icons/icon.icns \
          --osx-bundle-identifier "com.bayaarts.signalreceiver" \
          --target-arch "x86_64" \
          --codesign-identity "-" \
          --entitlements entitlements.plist \
          --hidden-import "keyboard._darwinkeyboard" \
          --hidden-import "keyboard._nixcommon" \
          --add-data "icons/icon.icns:." \
          --distpath ./dist \
          --workpath ./build \
          --specpath ./spec \
          src/main.py
          
    - name: Create DMG
      run: |
        # Create DMG structure
        mkdir -p dist/dmg
        cp -r "dist/SignalReceiver.app" "dist/dmg/"
        
        # Create Applications shortcut
        ln -s /Applications "dist/dmg/Applications"
        
        # Build DMG
        hdiutil create \
          -volname "SignalReceiver" \
          -srcfolder "dist/dmg" \
          -ov \
          -format UDZO \
          "dist/SignalReceiver.dmg"
          
    - name: Calculate checksums
      run: |
        cd dist
        shasum -a 256 SignalReceiver.dmg > SignalReceiver.dmg.sha256
        shasum -a 256 SignalReceiver.app.zip > SignalReceiver.app.zip.sha256
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: SignalReceiver-macOS
        path: |
          dist/SignalReceiver.dmg
          dist/SignalReceiver.dmg.sha256
          dist/SignalReceiver.app.zip
          dist/SignalReceiver.app.zip.sha256
        retention-days: 30
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/SignalReceiver.dmg
          dist/SignalReceiver.dmg.sha256
        generate_release_notes: true